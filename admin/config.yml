backend:
  name: git-gateway
  branch: main

media_folder: "assets/uploads"
public_folder: "/assets/uploads"

collections:

  # ── PLAYER PROFILE ─────────────────────────────────────────────
  - name: "profile"
    label: "Player Profile"
    files:
      - name: "profile"
        label: "Profile & Bio"
        file: "content/profile.json"
        format: json
        fields:
          - label: "Display Name"
            name: "name"
            widget: "string"
            hint: "Shown in the ABOUT card (e.g. MANASI PANT)"
          - label: "Email"
            name: "email"
            widget: "string"
          - label: "Education"
            name: "education"
            widget: "string"
          - label: "Status Line"
            name: "status"
            widget: "string"
            hint: "e.g. ★ EXPLORING AND LEARNING ★"
          - label: "Summary / Tagline"
            name: "summary"
            widget: "string"
          - label: "Bio"
            name: "bio"
            widget: "markdown"
            hint: "Rich text. Supports **bold**, *italic*, [links](url), and paragraphs."
          - label: "Resume PDF"
            name: "resumeUrl"
            widget: "file"
            required: false
            allow_multiple: false
            hint: "Upload your resume PDF. Once uploaded, a button appears on your site linking to it."

  # ── SKILLS ─────────────────────────────────────────────────────
  - name: "skills"
    label: "Skills & Abilities"
    files:
      - name: "skills"
        label: "Skills List"
        file: "content/skills.json"
        format: json
        fields:
          - label: "Skills"
            name: "skills"
            widget: "list"
            summary: "{{fields.name}} — LV.{{fields.level}}"
            fields:
              - label: "Skill Name"
                name: "name"
                widget: "string"
                hint: "All caps, e.g. RESEARCH"
              - label: "Level (1-10)"
                name: "level"
                widget: "number"
                value_type: "int"
                min: 1
                max: 10

  # ── QUEST LOG PROJECTS ──────────────────────────────────────────
  - name: "projects"
    label: "Quest Log"
    files:
      - name: "projects"
        label: "All Projects"
        file: "content/projects.json"
        format: json
        fields:
          - label: "Research"
            name: "research"
            widget: "list"
            summary: "{{fields.title}}"
            fields:
              - label: "Title"
                name: "title"
                widget: "string"
              - label: "Tags"
                name: "tags"
                widget: "list"
                field:
                  label: "Tag"
                  name: "tag"
                  widget: "string"
              - label: "Description"
                name: "desc"
                widget: "markdown"
                hint: "Supports **bold**, *italic*, and [links](url)"
              - label: "Status"
                name: "status"
                widget: "select"
                options: ["ONGOING", "COMPLETE", "PLANNED", "PAUSED"]
              - label: "Date (YYYY-MM)"
                name: "date"
                widget: "string"
              - label: "External Link"
                name: "link"
                widget: "string"
                required: false
                hint: "Optional URL to the project, paper, or page"
              - label: "Image"
                name: "image"
                widget: "image"
                required: false
                hint: "Optional thumbnail image for the project card"
              - label: "Video URL"
                name: "videoUrl"
                widget: "string"
                required: false
                hint: "YouTube or Vimeo URL — auto-shows thumbnail with play button on card"
              - label: "Audio File"
                name: "audioUrl"
                widget: "file"
                required: false
                allow_multiple: false
                hint: "Upload MP3 or OGG — shows an audio player on the card"
              - label: "Document / Attachment"
                name: "documentUrl"
                widget: "file"
                required: false
                allow_multiple: false
                hint: "Upload PDF, doc, or any file — shows a VIEW DOC button on the card"

          - label: "Multimedia"
            name: "multimedia"
            widget: "list"
            summary: "{{fields.title}}"
            fields:
              - label: "Title"
                name: "title"
                widget: "string"
              - label: "Tags"
                name: "tags"
                widget: "list"
                field:
                  label: "Tag"
                  name: "tag"
                  widget: "string"
              - label: "Description"
                name: "desc"
                widget: "markdown"
                hint: "Supports **bold**, *italic*, and [links](url)"
              - label: "Status"
                name: "status"
                widget: "select"
                options: ["ONGOING", "COMPLETE", "PLANNED", "PAUSED"]
              - label: "Date (YYYY-MM)"
                name: "date"
                widget: "string"
              - label: "External Link"
                name: "link"
                widget: "string"
                required: false
              - label: "Image"
                name: "image"
                widget: "image"
                required: false

          - label: "Blog"
            name: "blog"
            widget: "list"
            summary: "{{fields.title}}"
            fields:
              - label: "Title"
                name: "title"
                widget: "string"
              - label: "Tags"
                name: "tags"
                widget: "list"
                field:
                  label: "Tag"
                  name: "tag"
                  widget: "string"
              - label: "Description"
                name: "desc"
                widget: "markdown"
                hint: "Supports **bold**, *italic*, and [links](url)"
              - label: "Status"
                name: "status"
                widget: "select"
                options: ["ONGOING", "COMPLETE", "PLANNED", "PAUSED"]
              - label: "Date (YYYY-MM)"
                name: "date"
                widget: "string"
              - label: "External Link"
                name: "link"
                widget: "string"
                required: false
              - label: "Image"
                name: "image"
                widget: "image"
                required: false

          - label: "Resources"
            name: "resources"
            widget: "list"
            summary: "{{fields.title}}"
            fields:
              - label: "Title"
                name: "title"
                widget: "string"
              - label: "Tags"
                name: "tags"
                widget: "list"
                field:
                  label: "Tag"
                  name: "tag"
                  widget: "string"
              - label: "Description"
                name: "desc"
                widget: "markdown"
                hint: "Supports **bold**, *italic*, and [links](url)"
              - label: "Status"
                name: "status"
                widget: "select"
                options: ["ONGOING", "COMPLETE", "PLANNED", "PAUSED"]
              - label: "Date (YYYY-MM)"
                name: "date"
                widget: "string"
              - label: "External Link"
                name: "link"
                widget: "string"
                required: false
              - label: "Image"
                name: "image"
                widget: "image"
                required: false

          - label: "Features"
            name: "features"
            widget: "list"
            summary: "{{fields.title}}"
            fields:
              - label: "Title"
                name: "title"
                widget: "string"
              - label: "Tags"
                name: "tags"
                widget: "list"
                field:
                  label: "Tag"
                  name: "tag"
                  widget: "string"
              - label: "Description"
                name: "desc"
                widget: "markdown"
                hint: "Supports **bold**, *italic*, and [links](url)"
              - label: "Status"
                name: "status"
                widget: "select"
                options: ["ONGOING", "COMPLETE", "PLANNED", "PAUSED"]
              - label: "Date (YYYY-MM)"
                name: "date"
                widget: "string"
              - label: "External Link"
                name: "link"
                widget: "string"
                required: false
              - label: "Image"
                name: "image"
                widget: "image"
                required: false

  # ── SITE TEXT ───────────────────────────────────────────────────
  - name: "site_text"
    label: "Site Text"
    files:
      - name: "site_text"
        label: "Boot Screen & Ticker"
        file: "content/site-text.json"
        format: json
        fields:
          - label: "Page Title (browser tab)"
            name: "pageTitle"
            widget: "string"
          - label: "Boot Screen Subtitle"
            name: "bootSubtitle"
            widget: "string"
          - label: "Ticker / Marquee Text"
            name: "ticker"
            widget: "text"
            hint: "The scrolling banner. Emoji and text, separated by spaces."

  # ── UI TEXT & BUTTONS ───────────────────────────────────────────
  - name: "ui_text"
    label: "UI Text & Buttons"
    files:
      - name: "ui_text"
        label: "Navigation, Buttons & Footer"
        file: "content/ui-text.json"
        format: json
        fields:
          - label: "Navigation Buttons"
            name: "nav"
            widget: "object"
            fields:
              - label: "About"
                name: "about"
                widget: "string"
              - label: "Skills"
                name: "skills"
                widget: "string"
              - label: "Quests / Projects"
                name: "quests"
                widget: "string"
              - label: "Mini Game"
                name: "minigame"
                widget: "string"
              - label: "Guestbook"
                name: "guestbook"
                widget: "string"

          - label: "Section Headers"
            name: "sections"
            widget: "object"
            fields:
              - label: "About Header"
                name: "about"
                widget: "string"
              - label: "Skills Header"
                name: "skills"
                widget: "string"
              - label: "Quest Log Header"
                name: "quests"
                widget: "string"
              - label: "Mini Game Header"
                name: "minigame"
                widget: "string"
              - label: "Guestbook Header"
                name: "guestbook"
                widget: "string"

          - label: "Footer"
            name: "footer"
            widget: "object"
            fields:
              - label: "Copyright Line"
                name: "copyright"
                widget: "string"
              - label: "Tagline"
                name: "tagline"
                widget: "string"

          - label: "Button Labels"
            name: "buttons"
            widget: "object"
            fields:
              - label: "Resume Preview Button"
                name: "resumePreview"
                widget: "string"
              - label: "Resume Open PDF Button"
                name: "resumeOpen"
                widget: "string"
              - label: "Guestbook Send Button"
                name: "guestbookSend"
                widget: "string"
              - label: "Breather Button"
                name: "breather"
                widget: "string"
              - label: "Start / Press Start Button"
                name: "startBtn"
                widget: "string"

          - label: "About Section Cards"
            name: "about"
            widget: "object"
            fields:
              - label: "Player Card Title"
                name: "card1Title"
                widget: "string"
              - label: "Bio Card Title"
                name: "card2Title"
                widget: "string"

          - label: "Guestbook Labels"
            name: "guestbook"
            widget: "object"
            fields:
              - label: "Message Placeholder"
                name: "placeholder"
                widget: "string"
              - label: "Card Title"
                name: "cardTitle"
                widget: "string"
              - label: "Card Subtitle"
                name: "cardSub"
                widget: "string"
